services:
  # Backend API Service
  - type: web
    name: bob-mcp-forge-api
    runtime: node
    plan: free
    buildCommand: npm run install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: BOB_API_KEY
        sync: false
      - key: IBM_CLOUD_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

# Made with Bob
